services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fhir
      POSTGRES_PASSWORD: fhir
      POSTGRES_DB: fhir_goals
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_create_tables.up.sql:/docker-entrypoint-initdb.d/001_create_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fhir -d fhir_goals"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: fhir
      DB_PASSWORD: fhir
      DB_NAME: fhir_goals
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
